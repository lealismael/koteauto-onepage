<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KoteAuto</title>
  <meta name="description" content="KoteAuto — Em breve." />
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #0f0f0f;
    }
    .page {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f0f0f;
    }
    img.hero {
      width: 100%;
      height: 100%;
      object-fit: cover;
      max-width: 2560px;
      max-height: 1440px;
      margin: 0 auto;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
<body>
  <main class="page" aria-label="KoteAuto">
    <picture>
      <!-- Mobile: até 768px -->
      <source srcset="/koteauto_mobile.png" media="(max-width: 768px)" />
      
      <!-- Desktop: acima de 768px -->
      <img class="hero" src="/koteauto_desktop.png" alt="KoteAuto — Em breve" />
    </picture>
  </main>
</body>
</html>
